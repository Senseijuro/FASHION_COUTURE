<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Épreuve 1 - QCM Maroquinerie</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/enigme1.css">
  <link rel="icon" type="image/jpeg" href="img/favicon.jpeg">
  <audio id="bg-music" loop><source src="audio/enigme_ost.mp3" type="audio/mpeg"></audio>
</head>
<body>
  <div class="page-loader" id="page-loader">
    <div class="loader-content"><div class="loader-logo"><div class="loader-symbols">
      <span class="loader-symbol circle"></span><span class="loader-symbol triangle"></span><span class="loader-symbol square"></span>
    </div></div>
    <div class="loader-text">ÉPREUVE 1 — QCM EXPRESS</div>
    <div class="loader-bar"><div class="loader-progress"></div></div>
    <div class="loader-status">L'atelier prépare les questions...</div></div>
  </div>
  <header class="header">
    <a href="index.html" class="back-btn">← Retour</a>
    <div class="header-center"><span class="page-badge">ÉPREUVE 1</span></div>
    <div class="header-right"></div>
  </header>
  <main class="game-page">
    <div class="game-container game-container-wide">
      <div class="game-header">
        <div class="game-icon-large">👜</div>
        <h1 class="cyan">QCM EXPRESS</h1>
        <p>4 réponses possibles — une seule est juste ! 10 secondes par question !</p>
      </div>
      <div class="game-content">
        <div id="game-area" class="qcm-game">
          <div class="qcm-score-bar">
            <span class="qcm-round"   id="qcm-round">❓ 1 / 5</span>
            <span class="qcm-correct" id="qcm-correct">✅ 0</span>
            <span class="qcm-wrong"   id="qcm-wrong">❌ 0</span>
          </div>
          <div class="qcm-timer-bar"><div class="qcm-timer-fill" id="qcm-timer-fill"></div></div>
          <div class="qcm-card" id="qcm-card">
            <span class="qcm-category" id="qcm-category"></span>
            <span class="qcm-question" id="qcm-question">Prépare-toi...</span>
          </div>
          <div class="qcm-feedback" id="qcm-feedback"></div>
          <div class="qcm-choices"  id="qcm-choices"></div>
          <p class="qcm-hint">L'intervenant approfondira chaque réponse avec toi après !</p>
        </div>
        <div class="result-container-full hidden" id="result">
          <div class="result-box" id="result-box">
            <div class="result-icon" id="result-icon"></div>
            <h3 id="result-title"></h3>
            <p  id="result-text"></p>
            <p  class="result-score" id="result-score"></p>
            <a href="quiz.html" class="btn-primary">CONTINUER →</a>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="js/loader.js"></script>
  <script src="js/gameState.js"></script>
  <script src="js/globalTimer.js"></script>
  <script src="js/enigme1.js"></script> 
  <script src="js/music.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</body>
</html>
